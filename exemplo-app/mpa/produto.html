<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guitar Shop MPA | Produto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
          theme: {
            extend: {
              fontFamily: {
                sans: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"]
              },
              colors: {
                brand: {
                  ink: "#1c1917",
                  gold: "#f59e0b",
                  paper: "#fafaf9"
                }
              }
            }
          }
        };
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body class="min-h-screen bg-stone-50 font-sans text-stone-900">
    <div data-shared-header></div>

    <main class="mx-auto max-w-6xl px-4 py-10">
      <a href="categorias.html" class="mb-6 inline-flex items-center gap-2 rounded border border-stone-300 px-3 py-2 text-sm font-bold text-stone-700 transition hover:border-amber-500 hover:text-stone-950">
        <i data-lucide="arrow-left" class="h-4 w-4"></i>
        Voltar ao catalogo
      </a>

      <p data-loading class="rounded border border-stone-200 bg-white p-6 text-stone-600">Carregando produto...</p>
      <p data-error class="hidden rounded border border-red-200 bg-red-50 p-6 text-red-800">Produto nao encontrado ou catalogo indisponivel.</p>
      <div data-product-detail></div>
    </main>

    <div data-shared-footer></div>

    <script src="js/cart-storage.js"></script>
    <script src="js/render-shared.js"></script>
    <script src="js/produto.js"></script>
  </body>
</html>
