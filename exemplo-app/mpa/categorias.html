<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guitar Shop MPA | Categorias</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
          theme: {
            extend: {
              fontFamily: {
                sans: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"]
              },
              colors: {
                brand: {
                  ink: "#1c1917",
                  gold: "#f59e0b",
                  paper: "#fafaf9"
                }
              }
            }
          }
        };
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body class="min-h-screen bg-stone-50 font-sans text-stone-900">
    <div data-shared-header></div>

    <main class="mx-auto max-w-6xl px-4 py-10">
      <div class="flex flex-wrap items-end justify-between gap-4">
        <div>
          <p class="text-sm font-bold uppercase tracking-wide text-amber-700">Catalogo</p>
          <h1 class="mt-2 text-4xl font-black text-stone-950">Categoria: <span data-category-title>Todas</span></h1>
        </div>
        <a href="carrinho.html" class="inline-flex items-center gap-2 rounded bg-stone-950 px-4 py-2 text-sm font-bold text-white transition hover:bg-amber-500 hover:text-stone-950">
          Carrinho
          <i data-lucide="shopping-cart" class="h-4 w-4"></i>
        </a>
      </div>

      <div data-category-tabs class="mt-8 flex flex-wrap gap-2"></div>

      <p data-loading class="mt-8 rounded border border-stone-200 bg-white p-6 text-stone-600">Carregando catalogo...</p>
      <p data-error class="mt-8 hidden rounded border border-red-200 bg-red-50 p-6 text-red-800">Nao foi possivel carregar o catalogo. Rode a aplicacao em um servidor local.</p>
      <div data-products class="mt-8 grid gap-5"></div>
    </main>

    <div data-shared-footer></div>

    <script src="js/cart-storage.js"></script>
    <script src="js/render-shared.js"></script>
    <script src="js/categorias.js"></script>
  </body>
</html>
